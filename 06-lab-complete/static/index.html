<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sử Việt AI — Trợ lý Lịch sử Việt Nam</title>
    <meta name="description" content="Hỏi đáp lịch sử Việt Nam bằng trí tuệ nhân tạo. Hệ thống RAG và Agent thông minh.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ─── Sidebar ──────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <circle cx="20" cy="20" r="18" stroke="url(#gold-grad)" stroke-width="2"/>
                        <path d="M20 8 L26 16 L34 18 L28 24 L29 32 L20 28 L11 32 L12 24 L6 18 L14 16 Z" fill="url(#gold-grad)" opacity="0.9"/>
                        <defs>
                            <linearGradient id="gold-grad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#d4a853"/>
                                <stop offset="100%" stop-color="#f0c674"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>Sử Việt AI</h1>
                    <span class="logo-subtitle">Trợ lý Lịch sử</span>
                </div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-section">
            <label class="section-label">Chế độ trả lời</label>
            <div class="mode-toggle">
                <button class="mode-btn" data-mode="baseline" id="btn-baseline">
                    <span class="mode-icon">⚡</span>
                    <div class="mode-info">
                        <span class="mode-name">Baseline</span>
                        <span class="mode-desc">RAG nhanh</span>
                    </div>
                </button>
                <button class="mode-btn active" data-mode="agent" id="btn-agent">
                    <span class="mode-icon">🧠</span>
                    <div class="mode-info">
                        <span class="mode-name">Agent</span>
                        <span class="mode-desc">Suy luận sâu</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Suggested Questions -->
        <div class="suggestions-section">
            <label class="section-label">Câu hỏi gợi ý</label>
            <div class="suggestions">
                <button class="suggestion-btn" data-question="Tổng thống Mỹ nào đã bị ám sát vào ngày 22-11-1963?">
                    <span class="suggestion-icon">🎯</span>
                    <span>Tổng thống Mỹ bị ám sát ngày 22-11-1963?</span>
                </button>
                <button class="suggestion-btn" data-question="Tại sao Đảng và Chính phủ lại chủ trương tập trung phát triển công nghiệp địa phương trong những năm 1965-1968?">
                    <span class="suggestion-icon">🏭</span>
                    <span>Vì sao phát triển CN địa phương 1965-1968?</span>
                </button>
                <button class="suggestion-btn" data-question="Hãy trình bày diễn biến và ý nghĩa của chiến dịch Tổng tiến công và nổi dậy mùa Xuân 1975.">
                    <span class="suggestion-icon">🗓️</span>
                    <span>Diễn biến Tổng tiến công mùa Xuân 1975?</span>
                </button>
                <button class="suggestion-btn" data-question="Vai trò của tuyến đường Trường Sơn trong kháng chiến chống Mỹ là gì?">
                    <span class="suggestion-icon">🛤️</span>
                    <span>Vai trò đường Trường Sơn?</span>
                </button>
            </div>
        </div>

        <div class="sidebar-footer">
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Hệ thống sẵn sàng</span>
            </div>
        </div>
    </aside>

    <!-- ─── Mobile Header ────────────────────────────────────── -->
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
    </button>

    <!-- ─── Main Chat Area ───────────────────────────────────── -->
    <main class="chat-main">
        <div class="chat-container">
            <!-- Chat Messages -->
            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 80 80" fill="none" width="80" height="80">
                            <circle cx="40" cy="40" r="36" stroke="url(#welcome-grad)" stroke-width="2" opacity="0.6"/>
                            <circle cx="40" cy="40" r="28" stroke="url(#welcome-grad)" stroke-width="1.5" opacity="0.3"/>
                            <path d="M40 16 L48 28 L62 30 L52 40 L54 54 L40 48 L26 54 L28 40 L18 30 L32 28 Z" fill="url(#welcome-grad)" opacity="0.8"/>
                            <defs>
                                <linearGradient id="welcome-grad" x1="0" y1="0" x2="80" y2="80">
                                    <stop offset="0%" stop-color="#d4a853"/>
                                    <stop offset="50%" stop-color="#f0c674"/>
                                    <stop offset="100%" stop-color="#d4a853"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2 class="welcome-title">Xin chào! Tôi là Sử Việt AI</h2>
                    <p class="welcome-desc">
                        Tôi có thể trả lời các câu hỏi về lịch sử Việt Nam giai đoạn 1965–1975. 
                        Hãy chọn câu hỏi gợi ý hoặc tự đặt câu hỏi của bạn.
                    </p>
                    <div class="welcome-chips">
                        <span class="chip">📚 RAG-based</span>
                        <span class="chip">🧠 AI Agent</span>
                        <span class="chip">🇻🇳 Lịch sử VN</span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="chat-input" 
                        placeholder="Hỏi về lịch sử Việt Nam..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button class="send-btn" id="send-btn" aria-label="Gửi câu hỏi">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="mode-badge" id="mode-badge">🧠 Agent</span>
                    <span class="char-count" id="char-count">0 / 2000</span>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
